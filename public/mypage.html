<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Page</title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header Area -->
    <header class="mypage-header">
        <button class="icon-btn" aria-label="설정">
            <i class="fa-solid fa-gear"></i>
        </button>
        <div class="header-tabs">
            <button class="tab-btn active">내 쇼핑</button>
            <span class="tab-divider">|</span>
            <button class="tab-btn">내 프로필</button>
        </div>
        <button class="icon-btn" aria-label="장바구니">
            <i class="fa-solid fa-bag-shopping"></i>
        </button>
    </header>
    <!-- Profile Area -->
    <section class="profile-section">
        <div class="profile-info-row">
            <div class="profile-img-container">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQceBIRP2B6FYeMIsQBNlnzHnjd6HxqMzoQWiYvOMb0hQ&s=10" alt="프로필 이미지" class="profile-img">
            </div>
            <div class="profile-details">
                <h2 class="profile-nickname">vn53yflp</h2>
                <div class="profile-stats">
                    <span>팔로워 <strong>0</strong></span>
                    <span class="stat-divider">|</span>
                    <span>팔로잉 <strong>0</strong></span>
                </div>
            </div>
        </div>
        <div class="profile-actions">
            <button class="action-btn">프로필 관리</button>
            <button class="action-btn">프로필 공유</button>
        </div>
    </section>

    <!-- Divider -->
    <div class="thick-divider"></div>

    <!-- Button Grid Area -->
    <section class="grid-section">
        <div class="grid-container">
            <a href="#" class="grid-item">
                <i class="fa-solid fa-medal grid-icon"></i>
                <span class="grid-text">판매자 등급</span>
            </a>
            <a href="#" class="grid-item">
                <i class="fa-solid fa-p grid-icon"></i>
                <span class="grid-text">포인트</span>
            </a>
            <a href="#" class="grid-item">
                <i class="fa-solid fa-ticket grid-icon"></i>
                <span class="grid-text">쿠폰</span>
            </a>
            <a href="#" class="grid-item">
                <i class="fa-regular fa-comment-dots grid-icon"></i>
                <span class="grid-text">리뷰</span>
            </a>
            <a href="#" class="grid-item">
                <i class="fa-solid fa-user-group grid-icon"></i>
                <span class="grid-text">친구 초대</span>
            </a>
            <a href="#" class="grid-item">
                <i class="fa-regular fa-bell grid-icon"></i>
                <span class="grid-text">공지사항</span>
            </a>
        </div>
    </section>

    <!-- Divider (1) -->
    <div class="thick-divider"></div>

    <!-- Purchase History Area -->
    <section class="history-section">
        <h3 class="section-title">구매 내역</h3>
        <div class="history-box">
            <a href="#" class="history-item">
                <span class="history-label">전체</span>
                <span class="history-count highlight-count">0</span>
            </a>
            <a href="#" class="history-item">
                <span class="history-label">나에게 선물</span>
                <span class="history-count">0</span>
            </a>
            <a href="#" class="history-item">
                <span class="history-label">받은 선물</span>
                <span class="history-count">0</span>
            </a>
            <a href="#" class="history-item">
                <span class="history-label">사용 완료</span>
                <span class="history-count">0</span>
            </a>
        </div>
    </section>

    <!-- Divider (2) -->
    <div class="thick-divider"></div>

    <!-- Policy Grid -->
    <section class="policy-grid-section">
        <div class="policy-grid">
            <a href="#" class="policy-item">이용 정책</a>
            <a href="#" class="policy-item">검수 기준</a>
            <a href="#" class="policy-item">페널티 정책</a>
            <a href="#" class="policy-item">개인정보처리방침</a>
            <a href="#" class="policy-item">스토어 안내</a>
            <a href="#" class="policy-item">판매자 방문접수</a>
        </div>
    </section>

    <!-- Divider (3) -->
    <div class="thick-divider"></div>

    <!-- Customer Service Area -->
    <section class="cs-section">
        <h3 class="cs-title">고객센터 1588-1111</h3>
        <p class="cs-desc">운영시간 평일 10:00 - 19:00 (토,일 | 공휴일 휴무)</p>
        <p class="cs-desc">점심시간 평일 13:00 - 14:00</p>

        <div class="cs-buttons">
            <a href="#" class="cs-btn">자주 묻는 질문</a>
            <a href="#" class="cs-btn black-btn">채팅 상담하기</a>
            <a href="#" class="cs-btn">1:1 문의하기</a>
        </div>
    </section>

    <!-- JS -->
    <script src="js/mypage.js" defer></script>
</body>
</html>
