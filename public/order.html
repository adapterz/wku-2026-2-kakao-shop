<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문/결제 - 카카오톡 선물하기 클론</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Main Header -->
    <header class="main-header">
        <div class="header-container">
            <button onclick="history.back()" class="header-icon" title="뒤로가기">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <span class="header-title">
                <span class="header-logo-container">
                    <img src="images/iksan_logo.png" class="header-logo" alt="익산시 로고">
                </span>
                선물하기
            </span>
            <div style="width: 24px;"></div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="order-container">
            <!-- Celebration Card Section -->
            <div class="celebration-card-container">
                <div class="celebration-card">
                    <div class="card-message">
                        <div class="card-text-primary">나는 내가 챙긴다!</div>
                        <div class="card-text-secondary">소중한 나에게 주는 선물</div>
                    </div>
                    <button class="btn-edit-message" type="button">
                        T 메시지 편집
                    </button>
                </div>
            </div>
            <!-- Product Info Summary -->
            <div class="order-product-card">
                <img id="order-product-img" src="" alt="상품 이미지" class="order-product-img">
                <div class="order-product-info">
                    <span id="order-brand" class="order-brand-name"></span>
                    <h3 id="order-name" class="order-product-title"></h3>
                    <div class="order-product-qty-price" style="font-size: 13px; color: var(--text-sub); margin-top: 4px;">
                        <span id="order-unit-price"></span> | 수량: <span id="order-qty"></span>개
                    </div>
                </div>
            </div>

            <!-- Receiver Section -->
            <div class="order-section" id="receiver-section" style="display:none;">
                <h4 class="order-section-title">받는 사람</h4>
                <div class="search-user-wrapper" style="display: flex; gap: 8px;">
                    <input type="text" id="receiver-nickname-input" placeholder="받는 사람의 닉네임을 검색하세요" style="flex: 1; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px;">
                    <button id="btn-search-user" style="padding: 0 16px; background-color: #191919; color: #fff; border-radius: 8px; font-weight: 700; font-size: 14px;">검색</button>
                </div>
                <div id="receiver-search-result" style="margin-top: 10px; font-size: 14px; font-weight: 700;"></div>
            </div>

            <div class="order-section" id="self-receiver-section" style="display:none;">
                <h4 class="order-section-title">받는 사람</h4>
                <div style="padding: 12px; background-color: #F9F9F9; border-radius: 8px; font-size: 14px; font-weight: 700;">
                    나에게 선물하기 (본인 배송)
                </div>
            </div>

            <!-- Message Card Section -->
            <div class="order-section">
                <h4 class="order-section-title">메시지 카드</h4>
                <textarea id="message-input" placeholder="선물과 함께 보낼 따뜻한 메시지를 적어보세요 (선택)" maxlength="100" style="width: 100%; height: 100px; padding: 12px; border: 1px solid var(--border-color); border-radius: 8px; font-size: 14px; resize: none; font-family: inherit;"></textarea>
            </div>

            <!-- Price Summary & Submit -->
            <div class="order-summary-section">
                <div style="display:flex; justify-content:space-between; font-size:16px; font-weight:700; margin-bottom: 20px;">
                    <span>최종 결제 금액</span>
                    <span id="order-price" style="color:var(--kakao-brown);"></span>
                </div>
                <button id="btn-submit-order" class="btn-submit-order" style="width: 100%; padding: 16px; background-color: #FEE500; color: #3C1E1E; font-weight: 700; font-size: 16px; border-radius: 12px; text-align: center; cursor: pointer;">
                    결제하기
                </button>
            </div>
        </div>
    </main>

    <!-- Message Edit Overlay UI -->
    <div id="message-edit-overlay" class="message-edit-overlay">
        <div class="overlay-header">
            <button id="btn-edit-cancel" class="btn-overlay-nav" type="button">취소</button>
            <span class="overlay-title">메시지 카드 작성</span>
            <button id="btn-edit-save" class="btn-overlay-nav" type="button">완료</button>
        </div>
        <div class="overlay-body">
            <!-- Card Preview -->
            <div class="preview-card-container">
                <div class="celebration-card preview-card">
                    <div class="card-message">
                        <div class="card-text-primary" id="preview-text-primary">나는 내가 챙긴다!</div>
                        <div class="card-text-secondary" id="preview-text-secondary">소중한 나에게 주는 선물</div>
                    </div>
                </div>
            </div>
            <!-- Message Input Area -->
            <div class="message-input-container">
                <textarea id="edit-message-input" placeholder="메시지를 입력해 주세요."></textarea>
            </div>
        </div>
    </div>

    <!-- Script for Interactions -->
    <script src="js/order.js" defer></script>

</body>

</html>
