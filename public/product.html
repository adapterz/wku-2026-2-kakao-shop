<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 - Iksan Gift</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Main Header -->
    <header class="main-header" style="border-bottom: none;">
        <div class="header-container" style="justify-content: space-between;">
            <a href="#" id="btn-back" class="header-icon" title="뒤로가기">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><line x1="20" y1="12" x2="4" y2="12"></line><polyline points="10 18 4 12 10 6"></polyline></svg>
            </a>
            <div class="header-right-icons" style="gap: 16px;">
                <a href="#" id="btn-search-open" class="header-icon" title="검색">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="20" y1="20" x2="16" y2="16"></line></svg>
                </a>
                <a href="index.html" class="header-icon" title="홈">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 10l8-7 8 7v10H4z"></path>
                        <line x1="10" y1="16" x2="14" y2="16"></line>
                    </svg>
                </a>
                <a href="giftbox.html" class="header-icon" title="선물함">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 8h14l1 13H4L5 8z"></path>
                        <path d="M9 11V6a3 3 0 0 1 6 0v5"></path>
                    </svg>
                </a>
                <a href="#" class="header-icon" title="더보기">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="5" r="1.5"></circle><circle cx="12" cy="12" r="1.5"></circle><circle cx="12" cy="19" r="1.5"></circle></svg>
                </a>
            </div>
        </div>
    </header>



    <!-- Main Content Area -->
    <main class="main-content">
        <div class="product-detail-card">
            <div class="product-image-container">
                <img id="product-img" src="" alt="상품 이미지" class="product-detail-img">
            </div>
            <div class="product-info-container">
                <span id="product-brand" class="product-detail-brand"></span>
                <h2 id="product-name" class="product-detail-title"></h2>
                <div class="product-rating-row">
                    <span class="stars">
                        <i class="fa-solid fa-star" style="color: #191919;"></i>
                    </span>
                    <span class="review-count"><span style="color: #191919;">0.0</span>&nbsp;&nbsp;&nbsp;&nbsp;리뷰 0</span>
                </div>
                <div class="product-detail-price-row">
                    <span id="product-price" class="product-detail-price"></span>
                </div>
            </div>
            <!-- Brand Navigation Row -->
            <div class="brand-nav-row">
                <div class="brand-nav-left">
                    <div class="brand-nav-logo-container">
                        <i class="fa-solid fa-shop"></i>
                    </div>
                    <span id="product-brand-nav" class="brand-nav-title"></span>
                </div>
                <i class="fa-solid fa-chevron-right brand-nav-arrow"></i>
            </div>

            <!-- Product/Delivery Info Section -->
            <div class="product-detail-section">
                <h3 class="detail-section-title">상품정보</h3>
                <div class="info-list-item">
                    <i class="fa-solid fa-truck info-icon-blue"></i>
                    <span class="info-text">
                        <strong>배송비 포함</strong> <span class="info-subtext">도서산간 추가 배송비 안내 <i
                                class="fa-solid fa-circle-info"></i></span>
                    </span>
                </div>
                <div class="info-list-item">
                    <i class="fa-regular fa-square info-icon-blue"></i>
                    <span class="info-text">도서산간 배송 가능</span>
                </div>
            </div>

            <!-- Usage Section -->
            <div class="product-detail-section">
                <h3 class="detail-section-title">사용방법</h3>
                <div class="usage-box">
                    <div class="usage-icon-container">
                        <i class="fa-solid fa-location-dot"></i>
                    </div>
                    <span class="usage-text">원하는 배송지로 상품을 배송받아요.</span>
                </div>
            </div>

            <!-- Tabs Section -->
            <div class="product-tabs-container">
                <div class="product-tab active">상품설명</div>
                <div class="product-tab">선물후기 (0)</div>
                <div class="product-tab">상세정보</div>
            </div>
        </div>
    </main>


    <!-- Product Action Bottom Bar (bottom-nav 틀 재사용) -->
    <nav class="bottom-nav product-bottom-nav">
        <button class="bottom-action-item" aria-label="저장">
            <i class="fa-regular fa-bookmark"></i>
        </button>
        <button class="bottom-action-item" aria-label="공유">
            <i class="fa-solid fa-arrow-up-from-bracket"></i>
            <span class="icon-text">공유</span>
        </button>
        <button id="btn-self-gift" class="btn-bottom-buy">나에게 선물하기</button>
        <button id="btn-gift" class="btn-bottom-gift">선물하기</button>
    </nav>

    <!-- Fullscreen Search Overlay UI -->
    <div id="search-overlay" class="search-overlay">
        <div class="search-overlay-header">
            <button id="btn-search-close" class="btn-search-back" aria-label="뒤로가기">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="search-input-wrapper">
                <i class="fa-solid fa-magnifying-glass search-overlay-input-icon"></i>
                <input type="text" class="search-overlay-input" placeholder="원하는 선물을 검색해보세요" autofocus>
            </div>
        </div>
        <div class="search-overlay-body">
            <h4 class="recent-searches-title">최근 검색어</h4>
            <div class="recent-keywords-list">
                <a href="#" class="keyword-badge">익산역</a>
                <a href="#" class="keyword-badge">아메리카노</a>
                <a href="#" class="keyword-badge">익산</a>
                <a href="#" class="keyword-badge">익산역마켓</a>
                <a href="#" class="keyword-badge">소금빵</a>
            </div>
        </div>
    </div>

    <!-- Bottom Sheet UI -->
    <div id="bottom-sheet-overlay" class="bottom-sheet-overlay">
        <div class="bottom-sheet-content" id="bottom-sheet-content">
            <div class="bottom-sheet-handle-container" id="bottom-sheet-handle-container">
                <button class="bottom-sheet-handle-btn" aria-label="닫기">
                    <i class="fa-solid fa-caret-down"></i>
                </button>
            </div>
            <div class="bottom-sheet-body">

                <!-- Price info -->
                <div class="total-price-row">
                    <span class="total-price-label">총 결제 금액</span>
                    <span class="total-price-value">9,900원</span>
                </div>
                <!-- Action Buttons -->
                <div class="bottom-sheet-actions">
                    <button class="btn-sheet-cart">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#191919" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="8" width="18" height="13" rx="2" ry="2"></rect>
                            <path d="M16 8a4 4 0 0 0-8 0"></path>
                        </svg>선물담기
                    </button>
                    <button class="btn-sheet-buy">나에게 선물하기</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Script for Interactions -->
    <script src="js/product.js" defer></script>
    <script src="js/component.js" defer></script>

</body>

</html>
