<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>상품 상세 - 카카오톡 선물하기 클론</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Main Header -->
    <header class="main-header">
        <div class="header-container">
            <a href="giftbox.html" class="header-icon" title="선물함">
                <i class="fa-solid fa-bag-shopping"></i>
            </a>
            <span class="header-title">
                <span class="header-logo-container">
                    <img src="images/iksan_logo.png" class="header-logo" alt="익산시 로고">
                </span>
                선물하기
            </span>
            <a href="#" id="btn-search-open" class="header-icon" title="검색">
                <i class="fa-solid fa-magnifying-glass"></i>
            </a>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-content">
        <div class="product-detail-card">
            <div class="product-image-container">
                <img id="product-img" src="" alt="상품 이미지" class="product-detail-img">
            </div>
            <div class="product-info-container">
                <span id="product-brand" class="product-detail-brand"></span>
                <h2 id="product-name" class="product-detail-title"></h2>
                <div class="product-detail-price-row">
                    <span id="product-price" class="product-detail-price"></span>
                </div>
            </div>
            
            <hr class="divider">
            
            <div class="product-section">
                <h3 class="section-title">선물 설명</h3>
                <p id="product-description" class="section-content"></p>
            </div>
            
            <hr class="divider">
            
            <div class="product-section">
                <h3 class="section-title">유의 사항</h3>
                <p id="product-usage" class="section-content"></p>
            </div>
            
            <div class="product-action-buttons">
                <button class="btn-gift" onclick="location.href='order.html'">
                    <i class="fa-solid fa-gift"></i> 선물하기
                </button>
                <button class="btn-buy" onclick="location.href='order.html'">
                    구매하기
                </button>
            </div>
        </div>
    </main>


    <!-- Fixed Bottom Navigation Bar -->
    <nav class="bottom-nav-bar">
        <a href="index.html" class="bottom-nav-item">
            <i class="fa-solid fa-house"></i>
            <span>홈</span>
        </a>
        <a href="#" class="bottom-nav-item">
            <i class="fa-solid fa-bars"></i>
            <span>카테고리</span>
        </a>
        <a href="giftbox.html" class="bottom-nav-item">
            <i class="fa-regular fa-user"></i>
            <span>선물함</span>
        </a>
    </nav>

    <!-- Fullscreen Search Overlay UI -->
    <div id="search-overlay" class="search-overlay">
        <div class="search-overlay-header">
            <button id="btn-search-close" class="btn-search-back" aria-label="뒤로가기">
                <i class="fa-solid fa-arrow-left"></i>
            </button>
            <div class="search-input-wrapper">
                <i class="fa-solid fa-magnifying-glass search-overlay-input-icon"></i>
                <input type="text" class="search-overlay-input" placeholder="원하는 선물을 검색해보세요" autofocus>
            </div>
        </div>
        <div class="search-overlay-body">
            <h4 class="recent-searches-title">최근 검색어</h4>
            <div class="recent-keywords-list">
                <a href="#" class="keyword-badge">익산역</a>
                <a href="#" class="keyword-badge">아메리카노</a>
                <a href="#" class="keyword-badge">익산</a>
                <a href="#" class="keyword-badge">익산역마켓</a>
                <a href="#" class="keyword-badge">소금빵</a>
            </div>
        </div>
    </div>

    <!-- Script for Interactions -->
    <script src="js/product.js" defer></script>

</body>

</html>
