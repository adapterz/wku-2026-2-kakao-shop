<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선물 사용 - 카카오톡 선물하기 클론</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f2f2f2;
            max-width: 430px;
            margin: 0 auto;
            position: relative;
        }

        /* Gift Use Specific Styles */
        .user-profile-section {
            background-color: #fff;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profile-img-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 40%;
            background-color: #333; /* Dark placeholder like image */
            object-fit: cover;
        }
        .profile-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background-color: #FEE500;
            color: #3C1E1E;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 10px;
            border: 2px solid #fff;
            display: none; /* Only show for self gift */
        }
        .user-nickname {
            font-size: 15px;
            font-weight: 700;
            color: #191919;
        }

        .barcode-card-container {
            padding: 20px 16px;
        }
        .barcode-card {
            background-color: #fff;
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            text-align: center;
        }
        .product-img {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            object-fit: cover;
            margin-bottom: 20px;
            background-color: #f9f9f9;
        }
        .product-brand {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .product-name {
            font-size: 16px;
            font-weight: 700;
            color: #191919;
            margin-bottom: 24px;
            line-height: 1.4;
            word-break: keep-all;
        }
        .barcode-img-wrapper {
            width: 100%;
            max-width: 240px;
            margin: 0 auto 12px;
        }
        .barcode-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .barcode-text {
            font-size: 16px;
            font-weight: 700;
            color: #191919;
            letter-spacing: 1px;
            margin-bottom: 24px;
        }
        .btn-use {
            width: 100%;
            padding: 14px;
            background-color: #fff;
            color: #191919;
            font-size: 15px;
            font-weight: 700;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-use:active {
            background-color: #f5f5f5;
        }
        .btn-use:disabled {
            background-color: #f5f5f5;
            color: #ccc;
            cursor: not-allowed;
            border-color: #f5f5f5;
        }
    </style>
</head>

<body>
    <!-- Main Header -->
    <header class="main-header">
        <div class="header-container">
            <a href="giftbox.html" class="header-icon" title="선물함">
                <i class="fa-solid fa-bag-shopping"></i>
            </a>
            <span class="header-title">
                <span class="header-logo-container">
                    <img src="images/iksan_logo.png" class="header-logo" alt="익산시 로고">
                </span>
                선물하기
            </span>
            <a href="#" id="btn-search-open" class="header-icon" title="검색">
                <i class="fa-solid fa-magnifying-glass"></i>
            </a>
        </div>
    </header>

    <!-- Navigation Bar (Horizontal Scrollable) -->
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="#" class="nav-item">for you</a>
            <a href="index.html" class="nav-item">홈</a>
            <a href="#" class="nav-item">인기상권</a>
            <a href="#" class="nav-item">실시간 랭킹</a>
            <a href="#" class="nav-item">익산역 맛집거리</a>
            <a href="#" class="nav-item">익산역 쇼핑거리</a>
            <a href="#" class="nav-item">익산역 선물거리</a>
            <a href="#" class="nav-item">청년상점거리</a>
            <a href="#" class="nav-item">역세권 금액권</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" style="padding-top: 0; padding-bottom: 40px;">
        <!-- User Profile Section -->
        <section class="user-profile-section">
            <div class="profile-img-wrapper">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRddtd9TEIWK75Nbxj7qbfyrNtnsmKnDhWBUFpw5CybsQ&s=10" alt="프로필" class="profile-img">
                <div id="self-badge" class="profile-badge">나</div>
            </div>
            <div class="user-nickname" id="receiver-nickname">불러오는 중...</div>
        </section>

        <!-- Barcode Card Section -->
        <section class="barcode-card-container">
            <div class="barcode-card">
                <img id="product-img" src="" alt="상품 이미지" class="product-img">
                <div id="product-brand" class="product-brand">브랜드</div>
                <div id="product-name" class="product-name">상품명</div>
                
                <div class="barcode-img-wrapper">
                    <!-- Standard Barcode Image -->
                    <img src="images/barcode.png" alt="바코드" class="barcode-img">
                </div>
                <!-- 12 digits barcode formatted as XXXX XXXX XXXX -->
                <div id="barcode-text" class="barcode-text">0000 0000 0000</div>
                
                <button id="btn-use" class="btn-use">내 앨범에 저장</button>
            </div>
        </section>
    </main>

    <!-- Script -->
    <script src="js/giftuse.js"></script>
</body>

</html>
