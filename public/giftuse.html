<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선물 사용 - Iksan Gift</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f2f2f2;
            max-width: 430px;
            margin: 0 auto;
            position: relative;
        }

        .main-content {
            padding-left: 0 !important;
            padding-right: 0 !important;
        }

        /* Gift Use Specific Styles */
        .user-profile-section {
            background-color: #fff;
            padding: 20px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .profile-img-wrapper {
            position: relative;
            width: 56px;
            height: 56px;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 16px;
            background-color: #333; /* Dark placeholder like image */
            object-fit: cover;
        }
        .profile-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background-color: #FEE500;
            color: #3C1E1E;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 5px;
            border-radius: 10px;
            border: 2px solid #fff;
            display: none; /* Only show for self gift */
        }
        .user-nickname {
            font-size: 15px;
            font-weight: 700;
            color: #191919;
        }

        .barcode-card-container {
            padding: 20px 16px;
        }
        .barcode-card {
            background-color: #fff;
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            text-align: center;
            width: 100%;
        }
        .product-img {
            width: 100%;
            height: 100%;
            border-radius: 0px;
            object-fit: cover;
            background-color: #f9f9f9;
        }
        .product-brand {
            font-size: 12px;
            color: #191919;
            margin-bottom: 4px;
        }
        .product-name {
            font-size: 15px;
            font-weight: 700;
            color: #111;
            margin-bottom: 16px;
            line-height: 1.4;
            word-break: keep-all;
        }
        .barcode-img-wrapper {
            width: 100%;
            max-width: 240px;
            margin: 0 auto 8px;
        }
        .barcode-img {
            width: 100%;
            height: auto;
            display: block;
        }
        .barcode-text {
            font-size: 15px;
            font-weight: 700;
            color: #191919;
            letter-spacing: 0.5px;
            margin-bottom: 16px;
        }
        .btn-use {
            width: 100%;
            max-width: 100%;
            padding: 12px 0;
            background-color: #fff;
            color: #555;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #e2e2e2;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-use:active {
            background-color: #f5f5f5;
        }
        /* Skeleton and Error Styles */
        .skeleton {
            background-color: #f2f2f2;
            color: transparent !important;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: inline-block;
        }
        .skeleton::after {
            content: '';
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: translateX(-100%);
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading {
            100% {
                transform: translateX(100%);
            }
        }
        .error-message {
            color: #ff4d4f;
            font-size: 14px;
            margin: 20px 0;
            font-weight: 700;
        }
    </style>
</head>

        </section>

        <!-- Barcode Card Section -->
        <section class="barcode-card-container">
            <div class="barcode-card" id="barcode-card">
                <!-- Product Image Wrapper for Skeleton -->
                <div id="product-img-wrapper" class="skeleton" style="position: relative; width: 80%; margin: 0 auto 10px; aspect-ratio: 1 / 1; border-radius: 16px; overflow: hidden;">
                    <img id="product-img" src="" alt="상품 이미지" class="product-img" style="display: none; width: 100%; height: 100%; object-fit: cover; margin-bottom: 0; border-radius: 0px;">
                </div>
                
                <div id="product-brand" class="product-brand skeleton" style="min-width: 80px; min-height: 14px; margin-bottom: 4px;">&nbsp;</div>
                <div id="product-name" class="product-name skeleton" style="min-width: 150px; min-height: 20px; margin-bottom: 16px;">&nbsp;</div>
                
                <!-- Barcode Section (Hidden by default, shown when loaded) -->
                <div id="barcode-section" style="width: 100%; display: none; flex-direction: column; align-items: center;">
                    <div class="barcode-img-wrapper">
                        <!-- Standard Barcode Image -->
                        <img src="images/barcode.png" alt="바코드" class="barcode-img">
                    </div>
                    <!-- 12 digits barcode formatted as XXXX XXXX XXXX -->
                    <div id="barcode-text" class="barcode-text">0000 0000 0000</div>
                </div>
                
                <!-- Barcode Skeleton -->
                <div id="barcode-skeleton" class="skeleton" style="width: 240px; height: 50px; margin-bottom: 16px;"></div>
                
                <button id="btn-use" class="btn-use" disabled>선물 사용하기</button>
            </div>
        </section>
    </main>
