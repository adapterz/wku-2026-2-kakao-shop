<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문완료 - Iksan Gift</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f2f2f2; /* Light gray background to show section dividers clearly */
        }
        .complete-header {
            background-color: #fff;
            height: 52px;
            display: flex;
            align-items: center;
            padding: 0 16px;
        }
        .complete-header a {
            color: #191919;
            font-size: 20px;
            text-decoration: none;
        }
        .complete-message-section {
            background-color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 24px;
        }
        .profile-image-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 40%; /* slightly squircle */
            background-color: #e0e0e0;
            object-fit: cover;
        }
        .profile-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background-color: #FEE500;
            color: #3C1E1E;
            font-size: 12px;
            font-weight: 700;
            padding: 4px 6px;
            border-radius: 10px;
            border: 2px solid #fff;
            display: none; /* Only show for self gift */
        }
        .complete-title {
            font-size: 20px;
            font-weight: 700;
            color: #191919;
            text-align: center;
            line-height: 1.4;
            margin-bottom: 24px;
        }
        .complete-title strong {
            font-weight: 700;
        }
        .promo-banner {
            width: 100%;
            background-color: #F9F9F9;
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: #191919;
        }
        .promo-content {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            font-weight: 700;
        }
        .promo-img {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #ddd;
            object-fit: cover;
        }
        
        .section-container {
            background-color: #fff;
            margin-top: 8px;
            padding: 24px 20px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: #191919;
        }
        .btn-edit-address {
            padding: 6px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: #fff;
            font-size: 12px;
            color: var(--text-sub);
            cursor: pointer;
        }
        .address-info {
            font-size: 14px;
            line-height: 1.5;
            color: #191919;
        }
        .address-name {
            font-weight: 700;
        }
        .address-phone {
            color: var(--text-sub);
            margin-left: 6px;
            font-size: 13px;
        }
        .address-detail {
            margin-top: 6px;
            color: var(--text-sub);
            font-size: 13px;
        }
        
        .gift-item-card {
            display: flex;
            gap: 16px;
        }
        .gift-img-wrapper {
            width: 72px;
            height: 72px;
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .gift-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .gift-info {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .gift-brand {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }
        .gift-name {
            font-size: 14px;
            color: #191919;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .gift-qty {
            font-size: 13px;
            color: var(--text-sub);
        }

        .bottom-actions {
            display: flex;
            gap: 8px;
            padding: 24px 20px;
            background-color: #f2f2f2;
        }
        .btn-action-left {
            flex: 1;
            background-color: #fff;
            color: #191919;
            font-size: 14px;
            font-weight: 700;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 14px 0;
            cursor: pointer;
        }
        .btn-action-right {
            flex: 1;
            background-color: #FEE500;
            color: #3C1E1E;
            font-size: 14px;
            font-weight: 700;
            border: none;
            border-radius: 4px;
            padding: 14px 0;
            cursor: pointer;
        }
        .main-content {
            padding-bottom: 40px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <!-- Main Header -->
    <header class="main-header">
        <div class="header-container">
            <a href="giftbox.html" class="header-icon" title="선물함">
                <i class="fa-solid fa-bag-shopping"></i>
            </a>
            <span class="header-title">
                <span class="header-logo-container">
                    <img src="images/iksan_logo.png" class="header-logo" alt="익산시 로고">
                </span>
                선물하기
            </span>
            <a href="#" id="btn-search-open" class="header-icon" title="검색">
                <i class="fa-solid fa-magnifying-glass"></i>
            </a>
        </div>
    </header>

    <!-- Navigation Bar (Horizontal Scrollable) -->
    <nav class="nav-bar">
        <div class="nav-container">
            <a href="#" class="nav-item">for you</a>
            <a href="index.html" class="nav-item active">홈</a>
            <a href="#" class="nav-item">인기상권</a>
            <a href="#" class="nav-item">실시간 랭킹</a>
            <a href="#" class="nav-item">익산역 맛집거리</a>
            <a href="#" class="nav-item">익산역 쇼핑거리</a>
            <a href="#" class="nav-item">익산역 선물거리</a>
            <a href="#" class="nav-item">청년상점거리</a>
            <a href="#" class="nav-item">역세권 금액권</a>
        </div>
    </nav>

    <main class="main-content" style="padding-top: 0; background-color: transparent;">
        <!-- Message Section -->
        <section class="complete-message-section">
            <div class="profile-image-wrapper">
                <!-- Using a default profile image for now -->
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRddtd9TEIWK75Nbxj7qbfyrNtnsmKnDhWBUFpw5CybsQ&s=10" alt="프로필" class="profile-img">
                <div id="self-badge" class="profile-badge">나</div>
            </div>
            
            <h2 class="complete-title" id="complete-title">
                <strong>...</strong> 에게<br>
                선물을 보냈습니다.
            </h2>

            <a href="#" class="promo-banner">
                <div class="promo-content">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRU1cI9AEA1YXyWYucCHtRVx1-gJEZS4x36mnhhY9vUhA&s=10" alt="프로모션" class="promo-img">
                    여름필수템 최대 50% 할인
                </div>
                <i class="fa-solid fa-chevron-right" style="color: var(--text-muted); font-size: 12px;"></i>
            </a>
        </section>

        <!-- Delivery Address Section -->
        <section class="section-container" id="delivery-section" style="display: none;">
            <div class="section-header">
                <h3 class="section-title">선물배송지</h3>
                <button class="btn-edit-address">배송지 수정</button>
            </div>
            <div style="border-top: 1px solid #f0f0f0; margin-bottom: 16px;"></div>
            <div class="address-info">
                <div>
                    <span class="address-name" id="delivery-name">받는분</span>
                    <span class="address-phone" id="delivery-phone">010-0000-0000</span>
                </div>
                <div class="address-detail" id="delivery-address">
                    주소가 등록되지 않았습니다.
                </div>
            </div>
        </section>

        <!-- Sent Gift Section -->
        <section class="section-container">
            <div class="section-header">
                <h3 class="section-title">보낸 선물</h3>
            </div>
            <div style="border-top: 1px solid #f0f0f0; margin-bottom: 16px;"></div>
            <div class="gift-item-card">
                <div class="gift-img-wrapper">
                    <img id="gift-thumbnail" src="" alt="상품 썸네일" class="gift-img">
                </div>
                <div class="gift-info">
                    <div class="gift-brand" id="gift-brand">브랜드</div>
                    <div class="gift-name" id="gift-name">상품명</div>
                    <div class="gift-qty">수량 : 1개</div>
                </div>
            </div>
        </section>

        <!-- Normal Page Flow Buttons -->
        <div class="bottom-actions">
            <button class="btn-action-left" onclick="location.href='giftbox.html'">주문내역</button>
            <button class="btn-action-right" onclick="location.href='giftbox.html'">선물함 가기</button>
        </div>
    </main>

    <!-- Script for Data Fetching -->
    <script src="js/complete.js"></script>
</body>

</html>
