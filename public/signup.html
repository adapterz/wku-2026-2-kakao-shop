<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Iksan Gift</title>
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>



    <!-- Main Content Area -->
    <main class="main-content">
        <div class="auth-container">
            <h2 class="auth-title">회원가입</h2>
            <form id="signup-form" class="auth-form" novalidate>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="이메일을 입력하세요" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" name="password" placeholder="비밀번호를 입력하세요" autocomplete="new-password" required>
                </div>
                <div class="form-group">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" name="nickname" placeholder="닉네임을 입력하세요" autocomplete="nickname" required>
                </div>
                <p id="signup-error" class="auth-error" hidden></p>
                <button type="submit" class="btn-auth-submit">회원가입</button>
            </form>
            <div class="auth-footer">
                <span>이미 계정이 있으신가요?</span>
                <a href="login.html">로그인</a>
            </div>
        </div>
    </main>



    <!-- Script for Interactions -->
    <script src="js/signup.js" defer></script>

</body>

</html>
